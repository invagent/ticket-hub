# hub-issue 工单枢纽 — API 代理 + 前端静态
# Install to: /usr/local/nginx/conf/conf.d/hub-issue.conf  (included by nginx.conf)
# Frontend must be built with VITE_PUBLIC_BASE=/hub-issue/ (see build-frontend.sh).
location ^~ /hub-issue/api/ {
    proxy_pass http://127.0.0.1:9095/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
}

location ^~ /hub-issue/webhook/ {
    proxy_pass http://127.0.0.1:9095/webhook/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
}

location ^~ /hub-issue/health {
    proxy_pass http://127.0.0.1:9095/health;
    proxy_set_header Host $host;
}

location = /hub-issue {
    return 301 /hub-issue/;
}

location /hub-issue/ {
    alias /data/hub-issue/frontend-dist/;
    try_files $uri $uri/ /hub-issue/index.html;
    index index.html;
}
