name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (lint + unit + pii-cov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: ruff format --check app tests
      - run: mypy app
      - name: Unit tests (D0: gate >= 50%, D1+ raise to 70%)
        run: pytest tests/unit -v --cov=app --cov-report=term-missing --cov-fail-under=50
      - name: PII coverage gate (>= 95%)
        run: pytest tests/unit/core/pii -v --cov=app/core/pii --cov-report=term-missing --cov-fail-under=95

  backend-integration:
    name: Backend (integration with real PG)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      pg:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: ticket_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d ticket_hub"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PG_DSN: postgresql+psycopg://hub:hub@localhost:5432/ticket_hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: D1 integration tests (real PG via testcontainers)
        run: pytest tests/integration -v -m integration
      - name: D1 routing replay verification
        run: python ../scripts/eval/d1_routing_replay.py tests/eval/routing_v1.jsonl --threshold 0.9

  frontend:
    name: Frontend (typecheck + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run type-check
      - run: npm run test

  cli:
    name: CLI (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests -v
